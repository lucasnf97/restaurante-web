<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante — Reservas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .navbar {
            background: #1a1a2e; color: white; padding: 0 32px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .navbar-links { display: flex; gap: 16px; align-items: center; }
        .navbar-links a { color: #a5b4fc; text-decoration: none; font-size: 14px; }
        .btn-logout {
            background: transparent; border: 1px solid #4f46e5; color: #a5b4fc;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn-logout:hover { background: #4f46e5; color: white; }

        .content { margin-top: 60px; padding: 32px; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .page-header h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; }

        .btn {
            padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: all 0.2s;
        }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: white; color: #444; border: 1.5px solid #e0e0e0; }
        .btn-secondary:hover { border-color: #4f46e5; color: #4f46e5; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .filtros {
            background: white; border-radius: 12px; padding: 16px 20px;
            display: flex; gap: 12px; align-items: center; margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .filtros input, .filtros select {
            padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        .filtros input:focus, .filtros select:focus { border-color: #4f46e5; }

        .tabla-wrapper {
            background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f9fa; padding: 12px 16px; text-align: left;
            font-size: 12px; font-weight: 700; color: #666;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        td { padding: 14px 16px; border-top: 1px solid #f0f0f0; font-size: 14px; color: #333; }
        tr:hover td { background: #fafafa; }

        .badge {
            padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-red { background: #fee2e2; color: #dc2626; }
        .badge-blue { background: #dbeafe; color: #1d4ed8; }
        .badge-gray { background: #f3f4f6; color: #666; }
        .badge-yellow { background: #fef9c3; color: #854d0e; }

        .acciones { display: flex; gap: 8px; }
        .empty { text-align: center; padding: 48px; color: #888; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 32px;
            width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; outline: none; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus { border-color: #4f46e5; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">🍽️ Gestión Restaurante</div>
    <div class="navbar-links">
        <a href="dashboard.html">← Dashboard</a>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</nav>

<div class="content">
    <div class="page-header">
        <h2>📅 Reservas</h2>
        <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nueva reserva</button>
    </div>

    <div class="filtros">
        <input type="date" id="filtro-fecha" onchange="cargarReservas()">
        <select id="filtro-estado" onchange="cargarReservas()">
            <option value="">Todos los estados</option>
            <option value="futura">Futura</option>
            <option value="activa">Activa</option>
            <option value="finalizada">Finalizada</option>
            <option value="cancelada">Cancelada</option>
        </select>
        <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar filtros</button>
    </div>

    <div class="tabla-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Fecha</th>
                    <th>Horario</th>
                    <th>Mesa</th>
                    <th>Comensales</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr><td colspan="7" class="empty">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal reserva -->
<div class="modal-overlay" id="modal-reserva">
    <div class="modal">
        <h3 id="modal-titulo">Nueva reserva</h3>

        <div class="form-row">
            <div class="form-group">
                <label>Nombre del cliente *</label>
                <input type="text" id="fr-nombre" placeholder="Nombre y apellido">
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" id="fr-telefono" placeholder="Opcional">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Fecha *</label>
                <input type="date" id="fr-fecha">
            </div>
            <div class="form-group">
                <label>Comensales *</label>
                <input type="number" id="fr-comensales" min="1" value="2">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Hora inicio *</label>
                <input type="time" id="fr-hora-inicio">
            </div>
            <div class="form-group">
                <label>Hora fin</label>
                <input type="time" id="fr-hora-fin">
            </div>
        </div>
        <div class="form-group">
            <label>Mesa asignada</label>
            <select id="fr-mesa">
                <option value="">Sin asignar</option>
            </select>
        </div>
        <div class="form-group">
            <label>Notas</label>
            <textarea id="fr-notas" rows="2" placeholder="Opcional"></textarea>
        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarReserva()">Guardar</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    requireAuth();
    requireRol("admin", "gerente");

    let reservas = [];
    let mesas = [];
    let editandoId = null;

    async function init() {
        const hoy = new Date().toISOString().split("T")[0];
        document.getElementById("filtro-fecha").value = hoy;
        mesas = await api.get("/mesas/");
        const selMesa = document.getElementById("fr-mesa");
        mesas.forEach(m => {
            selMesa.innerHTML += `<option value="${m.id}">Mesa ${m.numero} — ${m.sala}</option>`;
        });
        await cargarReservas();
    }

    async function cargarReservas() {
        const fecha = document.getElementById("filtro-fecha").value;
        const estado = document.getElementById("filtro-estado").value;
        let url = "/reservas/?";
        if (fecha) url += `fecha=${fecha}&`;
        if (estado) url += `estado=${estado}&`;
        reservas = await api.get(url);
        renderTabla();
    }

    function limpiarFiltros() {
        document.getElementById("filtro-fecha").value = "";
        document.getElementById("filtro-estado").value = "";
        cargarReservas();
    }

    function renderTabla() {
        const tbody = document.getElementById("tabla-body");
        if (!reservas.length) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty">No hay reservas para los filtros seleccionados</td></tr>`;
            return;
        }
        tbody.innerHTML = reservas.map(r => `
            <tr>
                <td>
                    <strong>${r.nombre_cliente}</strong>
                    ${r.telefono ? `<br><small style="color:#888">${r.telefono}</small>` : ""}
                </td>
                <td>${formatFecha(r.fecha)}</td>
                <td>${r.hora_inicio.substring(0,5)}${r.hora_fin ? ` — ${r.hora_fin.substring(0,5)}` : ""}</td>
                <td>${r.mesa_numero ? `Mesa ${r.mesa_numero}` : "<span style='color:#bbb'>Sin asignar</span>"}</td>
                <td>${r.comensales} personas</td>
                <td><span class="badge ${estadoBadge(r.estado)}">${r.estado}</span></td>
                <td>
                    <div class="acciones">
                        <button class="btn btn-secondary btn-sm" onclick="abrirModalEditar(${r.id})">Editar</button>
                        ${r.estado !== 'cancelada' ? `<button class="btn btn-danger btn-sm" onclick="cancelarReserva(${r.id})">Cancelar</button>` : ""}
                    </div>
                </td>
            </tr>
        `).join("");
    }

    function estadoBadge(e) {
        const map = { futura: 'badge-blue', activa: 'badge-green', finalizada: 'badge-gray', cancelada: 'badge-red' };
        return map[e] || 'badge-gray';
    }

    function formatFecha(f) {
        if (!f) return "—";
        const [y, m, d] = f.split("-");
        return `${d}/${m}/${y}`;
    }

    function abrirModalNuevo() {
        editandoId = null;
        document.getElementById("modal-titulo").textContent = "Nueva reserva";
        document.getElementById("fr-nombre").value = "";
        document.getElementById("fr-telefono").value = "";
        document.getElementById("fr-fecha").value = new Date().toISOString().split("T")[0];
        document.getElementById("fr-comensales").value = "2";
        document.getElementById("fr-hora-inicio").value = "";
        document.getElementById("fr-hora-fin").value = "";
        document.getElementById("fr-mesa").value = "";
        document.getElementById("fr-notas").value = "";
        document.getElementById("modal-reserva").classList.add("active");
    }

    function abrirModalEditar(id) {
        editandoId = id;
        const r = reservas.find(x => x.id === id);
        document.getElementById("modal-titulo").textContent = "Editar reserva";
        document.getElementById("fr-nombre").value = r.nombre_cliente;
        document.getElementById("fr-telefono").value = r.telefono || "";
        document.getElementById("fr-fecha").value = r.fecha;
        document.getElementById("fr-comensales").value = r.comensales;
        document.getElementById("fr-hora-inicio").value = r.hora_inicio.substring(0,5);
        document.getElementById("fr-hora-fin").value = r.hora_fin ? r.hora_fin.substring(0,5) : "";
        document.getElementById("fr-mesa").value = r.mesa_id || "";
        document.getElementById("fr-notas").value = r.notas || "";
        document.getElementById("modal-reserva").classList.add("active");
    }

    function cerrarModal() {
        document.getElementById("modal-reserva").classList.remove("active");
    }

    async function guardarReserva() {
        const body = {
            nombre_cliente: document.getElementById("fr-nombre").value.trim(),
            telefono: document.getElementById("fr-telefono").value.trim() || null,
            fecha: document.getElementById("fr-fecha").value,
            comensales: parseInt(document.getElementById("fr-comensales").value),
            hora_inicio: document.getElementById("fr-hora-inicio").value,
            hora_fin: document.getElementById("fr-hora-fin").value || null,
            mesa_id: parseInt(document.getElementById("fr-mesa").value) || null,
            notas: document.getElementById("fr-notas").value.trim() || null
        };

        if (!body.nombre_cliente || !body.fecha || !body.hora_inicio) {
            alert("Nombre, fecha y hora de inicio son obligatorios.");
            return;
        }

        try {
            if (editandoId) {
                await api.patch(`/reservas/${editandoId}`, body);
            } else {
                await api.post("/reservas/", body);
            }
            cerrarModal();
            await cargarReservas();
        } catch (err) { alert("Error: " + err.message); }
    }

    async function cancelarReserva(id) {
        if (!confirm("¿Cancelar esta reserva?")) return;
        try {
            await api.patch(`/reservas/${id}/cancelar`);
            await cargarReservas();
        } catch (err) { alert("Error: " + err.message); }
    }

    document.getElementById("modal-reserva").addEventListener("click", function(e) {
        if (e.target === this) cerrarModal();
    });

    init();
</script>
</body>
</html>
