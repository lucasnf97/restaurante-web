<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante — Carta y productos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .navbar {
            background: #1a1a2e; color: white; padding: 0 32px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .navbar-links { display: flex; gap: 16px; align-items: center; }
        .navbar-links a { color: #a5b4fc; text-decoration: none; font-size: 14px; }
        .navbar-links a:hover { color: white; }
        .btn-logout {
            background: transparent; border: 1px solid #4f46e5; color: #a5b4fc;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn-logout:hover { background: #4f46e5; color: white; }

        .content { margin-top: 60px; padding: 32px; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .page-header h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; }

        .btn {
            padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: all 0.2s;
        }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: white; color: #444; border: 1.5px solid #e0e0e0; }
        .btn-secondary:hover { border-color: #4f46e5; color: #4f46e5; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* ── FILTROS ── */
        .filtros {
            background: white; border-radius: 12px; padding: 16px 20px;
            display: flex; gap: 12px; align-items: center; margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-wrap: wrap;
        }
        .filtros select, .filtros input {
            padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        .filtros select:focus, .filtros input:focus { border-color: #4f46e5; }

        /* ── TABLA ── */
        .tabla-wrapper {
            background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f9fa; padding: 12px 16px; text-align: left;
            font-size: 12px; font-weight: 700; color: #666;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        td { padding: 14px 16px; border-top: 1px solid #f0f0f0; font-size: 14px; color: #333; }
        tr:hover td { background: #fafafa; }

        .badge {
            padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-red { background: #fee2e2; color: #dc2626; }
        .badge-gray { background: #f3f4f6; color: #666; }

        .acciones { display: flex; gap: 8px; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 32px;
            width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; outline: none; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #4f46e5;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

        .empty { text-align: center; padding: 48px; color: #888; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">🍽️ Gestión Restaurante</div>
    <div class="navbar-links">
        <a href="dashboard.html">← Dashboard</a>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</nav>

<div class="content">
    <div class="page-header">
        <h2>🍕 Carta y productos</h2>
        <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nuevo producto</button>
    </div>

    <!-- Filtros -->
    <div class="filtros">
        <select id="filtro-categoria" onchange="cargarProductos()">
            <option value="">Todas las categorías</option>
        </select>
        <select id="filtro-area" onchange="cargarProductos()">
            <option value="">Todas las áreas</option>
        </select>
        <select id="filtro-disponible" onchange="cargarProductos()">
            <option value="">Todos</option>
            <option value="true">Disponibles</option>
            <option value="false">No disponibles</option>
        </select>
        <input type="text" id="filtro-buscar" placeholder="Buscar por nombre..." oninput="filtrarLocal()">
    </div>

    <!-- Tabla -->
    <div class="tabla-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Área</th>
                    <th>Precio</th>
                    <th>Descuento</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr><td colspan="7" class="empty">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal producto -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-titulo">Nuevo producto</h3>

        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="f-nombre" placeholder="Ej: Milanesa napolitana">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="f-descripcion" rows="2" placeholder="Descripción opcional"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Precio *</label>
                <input type="number" id="f-precio" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Descuento %</label>
                <input type="number" id="f-descuento" min="0" max="100" step="0.1" placeholder="0">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Categoría</label>
                <select id="f-categoria"></select>
            </div>
            <div class="form-group">
                <label>Área</label>
                <select id="f-area"></select>
            </div>
        </div>
        <div class="form-group">
            <label>Disponible</label>
            <select id="f-disponible">
                <option value="true">Sí</option>
                <option value="false">No</option>
            </select>
        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarProducto()">Guardar</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    requireAuth();
    requireRol("admin", "gerente");

    let productos = [];
    let categorias = [];
    let areas = [];
    let editandoId = null;

    async function init() {
        await Promise.all([cargarCategorias(), cargarAreas()]);
        await cargarProductos();
    }

    async function cargarCategorias() {
        categorias = await api.get("/productos/categorias");
        const sel = document.getElementById("filtro-categoria");
        const selF = document.getElementById("f-categoria");
        categorias.forEach(c => {
            sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
            selF.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
        });
    }

    async function cargarAreas() {
        areas = await api.get("/productos/areas");
        const sel = document.getElementById("filtro-area");
        const selF = document.getElementById("f-area");
        areas.forEach(a => {
            sel.innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
            selF.innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
        });
    }

    async function cargarProductos() {
        const cat = document.getElementById("filtro-categoria").value;
        const area = document.getElementById("filtro-area").value;
        const disp = document.getElementById("filtro-disponible").value;

        let url = "/productos/?";
        if (cat) url += `categoria_id=${cat}&`;
        if (area) url += `area_id=${area}&`;
        if (disp !== "") url += `disponible=${disp}&`;

        productos = await api.get(url);
        renderTabla(productos);
    }

    function filtrarLocal() {
        const q = document.getElementById("filtro-buscar").value.toLowerCase();
        const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(q));
        renderTabla(filtrados);
    }

    function renderTabla(lista) {
        const tbody = document.getElementById("tabla-body");
        if (!lista.length) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty">No hay productos</td></tr>`;
            return;
        }
        tbody.innerHTML = lista.map(p => `
            <tr>
                <td><strong>${p.nombre}</strong>${p.descripcion ? `<br><small style="color:#888">${p.descripcion}</small>` : ""}</td>
                <td>${p.categoria || "<span style='color:#bbb'>—</span>"}</td>
                <td>${p.area || "<span style='color:#bbb'>—</span>"}</td>
                <td><strong>$${parseFloat(p.precio).toFixed(2)}</strong></td>
                <td>${p.descuento_pct > 0 ? `<span class="badge badge-green">${p.descuento_pct}%</span>` : "<span style='color:#bbb'>—</span>"}</td>
                <td>
                    <span class="badge ${p.disponible ? 'badge-green' : 'badge-red'}">
                        ${p.disponible ? "Disponible" : "No disponible"}
                    </span>
                </td>
                <td>
                    <div class="acciones">
                        <button class="btn btn-secondary btn-sm" onclick="toggleDisponible(${p.id}, ${p.disponible})">
                            ${p.disponible ? "Deshabilitar" : "Habilitar"}
                        </button>
                        <button class="btn btn-secondary btn-sm" onclick="abrirModalEditar(${p.id})">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="eliminarProducto(${p.id})">Eliminar</button>
                    </div>
                </td>
            </tr>
        `).join("");
    }

    async function toggleDisponible(id, actual) {
        await api.patch(`/productos/${id}/disponibilidad`);
        await cargarProductos();
    }

    async function eliminarProducto(id) {
        if (!confirm("¿Eliminar este producto?")) return;
        await api.delete(`/productos/${id}`);
        await cargarProductos();
    }

    function abrirModalNuevo() {
        editandoId = null;
        document.getElementById("modal-titulo").textContent = "Nuevo producto";
        document.getElementById("f-nombre").value = "";
        document.getElementById("f-descripcion").value = "";
        document.getElementById("f-precio").value = "";
        document.getElementById("f-descuento").value = "0";
        document.getElementById("f-disponible").value = "true";
        document.getElementById("modal-overlay").classList.add("active");
    }

    function abrirModalEditar(id) {
        const p = productos.find(x => x.id === id);
        if (!p) return;
        editandoId = id;
        document.getElementById("modal-titulo").textContent = "Editar producto";
        document.getElementById("f-nombre").value = p.nombre;
        document.getElementById("f-descripcion").value = p.descripcion || "";
        document.getElementById("f-precio").value = p.precio;
        document.getElementById("f-descuento").value = p.descuento_pct || 0;
        document.getElementById("f-categoria").value = p.categoria_id || "";
        document.getElementById("f-area").value = p.area_id || "";
        document.getElementById("f-disponible").value = p.disponible ? "true" : "false";
        document.getElementById("modal-overlay").classList.add("active");
    }

    function cerrarModal() {
        document.getElementById("modal-overlay").classList.remove("active");
    }

    async function guardarProducto() {
        const body = {
            nombre: document.getElementById("f-nombre").value.trim(),
            descripcion: document.getElementById("f-descripcion").value.trim() || null,
            precio: parseFloat(document.getElementById("f-precio").value),
            descuento_pct: parseFloat(document.getElementById("f-descuento").value) || 0,
            categoria_id: parseInt(document.getElementById("f-categoria").value) || null,
            area_id: parseInt(document.getElementById("f-area").value) || null,
            disponible: document.getElementById("f-disponible").value === "true"
        };

        if (!body.nombre || isNaN(body.precio)) {
            alert("Nombre y precio son obligatorios.");
            return;
        }

        try {
            if (editandoId) {
                await api.patch(`/productos/${editandoId}`, body);
            } else {
                await api.post("/productos/", body);
            }
            cerrarModal();
            await cargarProductos();
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    // Cerrar modal al hacer click fuera
    document.getElementById("modal-overlay").addEventListener("click", function(e) {
        if (e.target === this) cerrarModal();
    });

    init();
</script>

</body>
</html>
