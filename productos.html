<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante — Carta y productos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

        .navbar {
            background: #1a1a2e; color: white; padding: 0 32px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .navbar-links { display: flex; gap: 16px; align-items: center; }
        .navbar-links a { color: #a5b4fc; text-decoration: none; font-size: 14px; }
        .btn-logout {
            background: transparent; border: 1px solid #4f46e5; color: #a5b4fc;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn-logout:hover { background: #4f46e5; color: white; }

        .content { margin-top: 60px; padding: 24px 32px; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .page-header h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; }

        .btn {
            padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: all 0.2s;
        }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: white; color: #444; border: 1.5px solid #e0e0e0; }
        .btn-secondary:hover { border-color: #4f46e5; color: #4f46e5; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-success { background: #16a34a; color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        /* ── TABS ── */
        .tabs {
            display: flex; gap: 4px; background: white; border-radius: 10px;
            padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px;
            width: fit-content;
        }
        .tab {
            padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-weight: 600; color: #666; transition: all 0.2s; border: none;
            background: transparent;
        }
        .tab.active { background: #4f46e5; color: white; }
        .tab:hover:not(.active) { background: #f5f3ff; color: #4f46e5; }

        /* ── FILTROS ── */
        .filtros {
            background: white; border-radius: 12px; padding: 14px 20px;
            display: flex; gap: 12px; align-items: center; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-wrap: wrap;
        }
        .filtros select, .filtros input {
            padding: 7px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        .filtros select:focus, .filtros input:focus { border-color: #4f46e5; }

        /* ── ACCIONES ── */
        .acciones-bar {
            background: white; border-radius: 12px; padding: 12px 20px;
            display: flex; gap: 10px; align-items: center; margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-wrap: wrap;
        }
        .sep { width: 1px; height: 28px; background: #e0e0e0; margin: 0 4px; }

        /* ── TABLA ── */
        .tabla-wrapper {
            background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f9fa; padding: 11px 14px; text-align: left;
            font-size: 12px; font-weight: 700; color: #666;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        td { padding: 12px 14px; border-top: 1px solid #f0f0f0; font-size: 14px; color: #333; }
        tr:hover td { background: #fafafa; }
        tr.sel td { background: #f5f3ff; }

        .badge {
            padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 600;
            display: inline-block;
        }
        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-red { background: #fee2e2; color: #dc2626; }
        .badge-gray { background: #f3f4f6; color: #666; }
        .badge-orange { background: #fff7ed; color: #c2410c; }
        .badge-blue { background: #dbeafe; color: #1d4ed8; }
        .badge-yellow { background: #fef9c3; color: #854d0e; }

        .fav-star { color: #f59e0b; font-size: 16px; }
        .empty { text-align: center; padding: 48px; color: #888; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 28px;
            width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 9px 12px; border: 1.5px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; outline: none; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #4f46e5; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .checkbox-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 14px; }

        /* ── DÍAS PROMO ── */
        .dias-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .dia-btn {
            width: 36px; height: 36px; border-radius: 50%; border: 2px solid #e0e0e0;
            cursor: pointer; font-size: 12px; font-weight: 700; background: white;
            color: #666; transition: all 0.2s;
        }
        .dia-btn.sel { background: #4f46e5; color: white; border-color: #4f46e5; }

        /* ── COMBO ITEMS ── */
        .combo-item-row {
            display: flex; gap: 8px; align-items: center;
            padding: 8px; background: #f8f9fa; border-radius: 8px; margin-bottom: 6px;
        }
        .combo-item-row select { flex: 1; }
        .combo-item-row input { width: 60px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">🍽️ Gestión Restaurante</div>
    <div class="navbar-links">
        <a href="dashboard.html">← Dashboard</a>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</nav>

<div class="content">
    <div class="page-header">
        <h2>🍕 Carta y productos</h2>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" id="tab-productos" onclick="setTab('productos')">Productos</button>
        <button class="tab" id="tab-combos" onclick="setTab('combos')">Combos</button>
        <button class="tab" id="tab-categorias" onclick="setTab('categorias')">Categorías</button>
    </div>

    <!-- ── VISTA PRODUCTOS ── -->
    <div id="vista-productos">
        <div class="acciones-bar">
            <button class="btn btn-primary btn-sm" onclick="abrirModalProducto()">+ Nuevo</button>
            <button class="btn btn-secondary btn-sm" id="btn-editar-prod" disabled onclick="editarProductoSel()">Editar</button>
            <button class="btn btn-danger btn-sm" id="btn-elim-prod" disabled onclick="eliminarProductoSel()">Eliminar</button>
            <button class="btn btn-warning btn-sm" id="btn-promo" disabled onclick="abrirModalPromo()">★ Promoción</button>
            <div class="sep"></div>
            <button class="btn btn-secondary btn-sm" onclick="exportarCSV()">↓ Exportar CSV</button>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('inp-csv').click()">↑ Importar CSV</button>
            <input type="file" id="inp-csv" accept=".csv" style="display:none" onchange="importarCSV(this)">
        </div>

        <div class="filtros">
            <select id="filtro-cat" onchange="cargarProductos()">
                <option value="">Todas las categorías</option>
            </select>
            <select id="filtro-area" onchange="cargarProductos()">
                <option value="">Todas las áreas</option>
            </select>
            <select id="filtro-estado" onchange="cargarProductos()">
                <option value="">Todos</option>
                <option value="encarta">En carta</option>
                <option value="agotado">Agotados</option>
                <option value="favorito">Favoritos</option>
            </select>
            <input type="text" id="filtro-buscar" placeholder="Buscar..." oninput="filtrarLocal()">
        </div>

        <div class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>★</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Área</th>
                        <th>Precio</th>
                        <th>Promo</th>
                        <th>En carta</th>
                        <th>Agotado</th>
                        <th>Orden</th>
                    </tr>
                </thead>
                <tbody id="tbody-productos">
                    <tr><td colspan="9" class="empty">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ── VISTA COMBOS ── -->
    <div id="vista-combos" style="display:none">
        <div class="acciones-bar">
            <button class="btn btn-primary btn-sm" onclick="abrirModalCombo()">+ Nuevo combo</button>
            <button class="btn btn-secondary btn-sm" id="btn-editar-combo" disabled onclick="editarComboSel()">Editar</button>
            <button class="btn btn-danger btn-sm" id="btn-elim-combo" disabled onclick="eliminarComboSel()">Eliminar</button>
        </div>
        <div class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>★</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Productos</th>
                        <th>Disponible</th>
                        <th>Agotado</th>
                    </tr>
                </thead>
                <tbody id="tbody-combos">
                    <tr><td colspan="7" class="empty">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ── VISTA CATEGORÍAS ── -->
    <div id="vista-categorias" style="display:none">
        <div class="acciones-bar">
            <button class="btn btn-primary btn-sm" onclick="abrirModalCategoria()">+ Nueva categoría</button>
        </div>
        <div class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Orden</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-cats">
                    <tr><td colspan="3" class="empty">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal producto -->
<div class="modal-overlay" id="modal-producto">
    <div class="modal">
        <h3 id="modal-prod-titulo">Nuevo producto</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="fp-nombre" placeholder="Nombre del producto">
            </div>
            <div class="form-group">
                <label>Precio *</label>
                <input type="number" id="fp-precio" min="0" step="0.01" placeholder="0.00">
            </div>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="fp-descripcion" rows="2" placeholder="Opcional"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Categoría</label>
                <select id="fp-categoria"></select>
            </div>
            <div class="form-group">
                <label>Área</label>
                <select id="fp-area"></select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Descuento % en carta</label>
                <input type="number" id="fp-descuento" min="0" max="100" step="0.1" value="0">
            </div>
            <div class="form-group">
                <label>Orden de visualización</label>
                <input type="number" id="fp-orden" min="0" value="0">
            </div>
        </div>
        <div class="checkbox-row" style="margin-top:8px">
            <label class="checkbox-item">
                <input type="checkbox" id="fp-encarta" checked> En carta
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="fp-agotado"> Agotado
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="fp-favorito"> ★ Favorito
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="fp-en-combo" checked> En combos
            </label>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('modal-producto')">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarProducto()">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal promoción -->
<div class="modal-overlay" id="modal-promo">
    <div class="modal">
        <h3 id="modal-promo-titulo">Promoción</h3>
        <div class="form-group">
            <label>Tipo de promoción</label>
            <select id="promo-tipo" onchange="cambiarTipoPromo()">
                <option value="descuento">Descuento fijo %</option>
                <option value="nxm">NxM (ej: 2x1, 3x2)</option>
            </select>
        </div>

        <div id="promo-descuento-sec">
            <div class="form-group">
                <label>% de descuento</label>
                <input type="number" id="promo-pct" min="0" max="100" step="0.1" value="10">
            </div>
        </div>

        <div id="promo-nxm-sec" style="display:none">
            <div class="form-row">
                <div class="form-group">
                    <label>Cantidad que paga</label>
                    <input type="number" id="promo-paga" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Cantidad que lleva</label>
                    <input type="number" id="promo-lleva" min="1" value="2">
                </div>
            </div>
        </div>

        <div class="form-group" style="margin-top:12px">
            <label>Días de la semana (dejar vacío = todos los días)</label>
            <div class="dias-grid" id="dias-grid">
                <button class="dia-btn sel" data-dia="L" onclick="toggleDia(this)">L</button>
                <button class="dia-btn sel" data-dia="M" onclick="toggleDia(this)">M</button>
                <button class="dia-btn sel" data-dia="X" onclick="toggleDia(this)">X</button>
                <button class="dia-btn sel" data-dia="J" onclick="toggleDia(this)">J</button>
                <button class="dia-btn sel" data-dia="V" onclick="toggleDia(this)">V</button>
                <button class="dia-btn sel" data-dia="S" onclick="toggleDia(this)">S</button>
                <button class="dia-btn sel" data-dia="D" onclick="toggleDia(this)">D</button>
            </div>
        </div>

        <div class="form-row" style="margin-top:8px">
            <div class="form-group">
                <label>Hora inicio (HH:MM)</label>
                <input type="time" id="promo-hi">
            </div>
            <div class="form-group">
                <label>Hora fin (HH:MM)</label>
                <input type="time" id="promo-hf">
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('modal-promo')">Cancelar</button>
            <button class="btn btn-danger btn-sm" onclick="eliminarPromo()" id="btn-elim-promo" style="display:none">Quitar promo</button>
            <button class="btn btn-primary" onclick="guardarPromo()">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal combo -->
<div class="modal-overlay" id="modal-combo">
    <div class="modal" style="max-width:640px">
        <h3 id="modal-combo-titulo">Nuevo combo</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="fc-nombre" placeholder="Ej: Menú del día">
            </div>
            <div class="form-group">
                <label>Precio *</label>
                <input type="number" id="fc-precio" min="0" step="0.01" placeholder="0.00">
            </div>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="fc-descripcion" rows="2" placeholder="Opcional"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Categoría</label>
                <select id="fc-categoria"></select>
            </div>
            <div class="form-group">
                <label>Área</label>
                <select id="fc-area"></select>
            </div>
        </div>
        <div class="form-group">
            <label>Productos del combo</label>
            <div id="combo-items-cont"></div>
            <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="agregarComboItem()">+ Agregar producto</button>
        </div>
        <div class="checkbox-row" style="margin-top:8px">
            <label class="checkbox-item"><input type="checkbox" id="fc-disponible" checked> Disponible</label>
            <label class="checkbox-item"><input type="checkbox" id="fc-favorito"> ★ Favorito</label>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('modal-combo')">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarCombo()">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal categoría -->
<div class="modal-overlay" id="modal-categoria">
    <div class="modal" style="max-width:400px">
        <h3 id="modal-cat-titulo">Nueva categoría</h3>
        <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="fcat-nombre" placeholder="Ej: Entradas">
        </div>
        <div class="form-group">
            <label>Orden</label>
            <input type="number" id="fcat-orden" value="0" min="0">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('modal-categoria')">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarCategoria()">Guardar</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
requireAuth();
requireRol("admin", "gerente");

let productos = [], combos = [], categorias = [], areas = [];
let prodSel = null, comboSel = null;
let editandoProdId = null, editandoComboId = null, editandoCatId = null;
let promoActual = null;
let tabActual = 'productos';

// ── TABS ──────────────────────────────────────────────────────
function setTab(tab) {
    tabActual = tab;
    ['productos','combos','categorias'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
        document.getElementById(`vista-${t}`).style.display = t === tab ? '' : 'none';
    });
    if (tab === 'combos') cargarCombos();
    if (tab === 'categorias') renderCategorias();
}

// ── INIT ──────────────────────────────────────────────────────
async function init() {
    [categorias, areas] = await Promise.all([
        api.get('/productos/categorias'),
        api.get('/productos/areas')
    ]);
    poblarSelects();
    await cargarProductos();
}

function poblarSelects() {
    const selCat = document.getElementById('filtro-cat');
    const selArea = document.getElementById('filtro-area');
    categorias.forEach(c => {
        selCat.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
        document.getElementById('fp-categoria').innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
        document.getElementById('fc-categoria').innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
    });
    areas.forEach(a => {
        selArea.innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
        document.getElementById('fp-area').innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
        document.getElementById('fc-area').innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
    });
}

// ── PRODUCTOS ─────────────────────────────────────────────────
async function cargarProductos() {
    const cat = document.getElementById('filtro-cat').value;
    const area = document.getElementById('filtro-area').value;
    const estado = document.getElementById('filtro-estado').value;
    let url = '/productos/?';
    if (cat) url += `categoria_id=${cat}&`;
    if (area) url += `area_id=${area}&`;
    if (estado === 'encarta') url += 'en_carta=true&';
    if (estado === 'agotado') url += 'agotado=true&'; // nota: necesitamos endpoint con agotado
    if (estado === 'favorito') url += 'favorito=true&';
    productos = await api.get(url);
    prodSel = null;
    actualizarBtnsProducto();
    renderProductos(productos);
}

function filtrarLocal() {
    const q = document.getElementById('filtro-buscar').value.toLowerCase();
    renderProductos(q ? productos.filter(p => p.nombre.toLowerCase().includes(q)) : productos);
}

function renderProductos(lista) {
    const tbody = document.getElementById('tbody-productos');
    if (!lista.length) { tbody.innerHTML = `<tr><td colspan="9" class="empty">No hay productos</td></tr>`; return; }
    tbody.innerHTML = lista.map(p => `
        <tr class="${prodSel && prodSel.id === p.id ? 'sel' : ''}" onclick="selProducto(${p.id})">
            <td>${p.favorito ? '<span class="fav-star">★</span>' : ''}</td>
            <td><strong>${p.nombre}</strong>${p.descripcion ? `<br><small style="color:#888">${p.descripcion}</small>` : ''}</td>
            <td>${p.categoria || '—'}</td>
            <td>${p.area || '—'}</td>
            <td><strong>$${parseFloat(p.precio).toFixed(2)}</strong>${p.descuento_pct > 0 ? ` <span class="badge badge-green">-${p.descuento_pct}%</span>` : ''}</td>
            <td id="promo-cell-${p.id}"><span class="badge badge-gray">—</span></td>
            <td><span class="badge ${p.en_carta ? 'badge-green' : 'badge-gray'}">${p.en_carta ? 'Sí' : 'No'}</span></td>
            <td><span class="badge ${p.agotado ? 'badge-orange' : 'badge-gray'}">${p.agotado ? 'Agotado' : 'No'}</span></td>
            <td>${p.orden}</td>
        </tr>
    `).join('');
    // Cargar promociones
    lista.forEach(p => cargarPromoCell(p.id));
}

async function cargarPromoCell(prodId) {
    try {
        const promos = await api.get(`/productos/${prodId}/promociones`);
        const cell = document.getElementById(`promo-cell-${prodId}`);
        if (!cell) return;
        if (!promos.length) { cell.innerHTML = '<span class="badge badge-gray">—</span>'; return; }
        const p = promos[0];
        let txt = '';
        if (p.tipo === 'nxm') txt = `${p.cantidad_lleva}x${p.cantidad_paga}`;
        else txt = `${p.descuento_pct}%`;
        if (p.hora_inicio) txt += ` ${p.hora_inicio.substring(0,5)}-${p.hora_fin.substring(0,5)}`;
        cell.innerHTML = `<span class="badge badge-yellow">${txt}</span>`;
    } catch(e) {}
}

// ── EXPORTAR / IMPORTAR CSV ───────────────────────────────────
function exportarCSV() {
    const headers = ['id','nombre','descripcion','precio','descuento_pct','categoria','area','en_carta','agotado','favorito','orden'];
    const rows = productos.map(p => headers.map(h => {
        const v = p[h];
        if (v === null || v === undefined) return '';
        if (typeof v === 'string' && v.includes(',')) return `"${v}"`;
        return v;
    }).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'productos.csv'; a.click();
}

async function importarCSV(input) {
    const file = input.files[0]; if (!file) return;
    const text = await file.text();
    const lines = text.split('\n').filter(l => l.trim());
    const headers = lines[0].split(',').map(h => h.trim());
    let ok = 0, err = 0;
    for (let i = 1; i < lines.length; i++) {
        const vals = lines[i].split(',');
        const row = {};
        headers.forEach((h, idx) => row[h] = vals[idx]?.replace(/"/g,'').trim());
        try {
            const body = {
                nombre: row.nombre, precio: parseFloat(row.precio) || 0,
                descripcion: row.descripcion || null,
                descuento_pct: parseFloat(row.descuento_pct) || 0,
                orden: parseInt(row.orden) || 0,
                en_carta: row.en_carta !== 'false',
                agotado: row.agotado === 'true',
                favorito: row.favorito === 'true',
                disponible: row.en_carta !== 'false'
            };
            if (row.categoria) {
                const cat = categorias.find(c => c.nombre.toLowerCase() === row.categoria.toLowerCase());
                if (cat) body.categoria_id = cat.id;
            }
            if (row.area) {
                const area = areas.find(a => a.nombre.toLowerCase() === row.area.toLowerCase());
                if (area) body.area_id = area.id;
            }
            await api.post('/productos/', body); ok++;
        } catch(e) { err++; }
    }
    alert(`Importación completada: ${ok} productos importados, ${err} errores.`);
    input.value = '';
    await cargarProductos();
}

// ── MODAL PROMOCIÓN ───────────────────────────────────────────
async function abrirModalPromo() {
    if (!prodSel) return;
    document.getElementById('modal-promo-titulo').textContent = `Promoción — ${prodSel.nombre}`;
    promoActual = null;
    // Resetear días
    document.querySelectorAll('.dia-btn').forEach(b => b.classList.add('sel'));
    document.getElementById('promo-hi').value = '';
    document.getElementById('promo-hf').value = '';
    document.getElementById('promo-tipo').value = 'descuento';
    document.getElementById('promo-pct').value = '10';
    document.getElementById('promo-paga').value = '1';
    document.getElementById('promo-lleva').value = '2';
    cambiarTipoPromo();

    try {
        const promos = await api.get(`/productos/${prodSel.id}/promociones`);
        if (promos.length) {
            promoActual = promos[0];
            document.getElementById('promo-tipo').value = promoActual.tipo;
            if (promoActual.tipo === 'nxm') {
                document.getElementById('promo-paga').value = promoActual.cantidad_paga;
                document.getElementById('promo-lleva').value = promoActual.cantidad_lleva;
            } else {
                document.getElementById('promo-pct').value = promoActual.descuento_pct;
            }
            if (promoActual.dias) {
                const dias = promoActual.dias.split('');
                document.querySelectorAll('.dia-btn').forEach(b => {
                    b.classList.toggle('sel', dias.includes(b.dataset.dia));
                });
            }
            if (promoActual.hora_inicio) document.getElementById('promo-hi').value = promoActual.hora_inicio.substring(0,5);
            if (promoActual.hora_fin) document.getElementById('promo-hf').value = promoActual.hora_fin.substring(0,5);
            cambiarTipoPromo();
            document.getElementById('btn-elim-promo').style.display = '';
        } else {
            document.getElementById('btn-elim-promo').style.display = 'none';
        }
    } catch(e) {}

    document.getElementById('modal-promo').classList.add('active');
}

function cambiarTipoPromo() {
    const tipo = document.getElementById('promo-tipo').value;
    document.getElementById('promo-descuento-sec').style.display = tipo === 'descuento' ? '' : 'none';
    document.getElementById('promo-nxm-sec').style.display = tipo === 'nxm' ? '' : 'none';
}

function toggleDia(btn) { btn.classList.toggle('sel'); }

async function guardarPromo() {

    const dias = Array.from(document.querySelectorAll('.dia-btn.sel')).map(b => b.dataset.dia).join('');
    const body = {
        tipo,
        descuento_pct: tipo === 'descuento' ? parseFloat(document.getElementById('promo-pct').value) : null,
        cantidad_paga: tipo === 'nxm' ? parseInt(document.getElementById('promo-paga').value) : null,
        cantidad_lleva: tipo === 'nxm' ? parseInt(document.getElementById('promo-lleva').value) : null,
        dias: dias || null,
        hora_inicio: document.getElementById('promo-hi').value || null,
        hora_fin: document.getElementById('promo-hf').value || null,
        activa: true
    };
    try {
        if (promoActual) await api.delete(`/productos/promociones/${promoActual.id}`);
        await api.post(`/productos/${prodSel.id}/promociones`, body);
        cerrarModal('modal-promo');

    } catch(err) { alert('Error: ' + err.message); }

async function eliminarPromo() {

        await api.delete(`/productos/promociones/${promoActual.id}`);

function renderCombos() {
    const tbody = document.getElementById('tbody-combos');

        <tr class="${comboSel && comboSel.id === c.id ? 'sel' : ''}" onclick="selCombo(${c.id})">

            <td><strong>$${parseFloat(c.precio).toFixed(2)}</strong></td>
            <td>${c.categoria || '—'}</td>
            <td>${c.items.map(i => `${i.cantidad}x ${i.categoria_nombre}`).join(', ')}</td>
            <td><span class="badge ${c.disponible ? 'badge-green' : 'badge-gray'}">${c.disponible ? 'Sí' : 'No'}</span></td>

function actualizarBtnsCombo() {
    const sel = !!comboSel;
    document.getElementById('btn-editar-combo').disabled = !sel;
    document.getElementById('btn-elim-combo').disabled = !sel;
}

function abrirModalCombo(id = null) {
    editandoComboId = id;
    document.getElementById('modal-combo-titulo').textContent = id ? 'Editar combo' : 'Nuevo combo';
    document.getElementById('combo-items-cont').innerHTML = '';

    if (id && comboSel) {
        document.getElementById('fc-nombre').value = comboSel.nombre;
        document.getElementById('fc-descripcion').value = comboSel.descripcion || '';
        document.getElementById('fc-precio').value = comboSel.precio;
        document.getElementById('fc-categoria').value = comboSel.categoria_id || '';
        document.getElementById('fc-area').value = comboSel.area_id || '';
        document.getElementById('fc-disponible').checked = comboSel.disponible;
        document.getElementById('fc-favorito').checked = comboSel.favorito;
        comboSel.items.forEach(i => agregarComboItem(i.categoria_id, i.cantidad));
    } else {
        ['fc-nombre','fc-descripcion'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('fc-precio').value = '';

        document.getElementById('fc-favorito').checked = false;

    }

}

function editarComboSel() { if (comboSel) abrirModalCombo(comboSel.id); }

function agregarComboItem(catId = '', cant = 1) {
    const cont = document.getElementById('combo-items-cont');
    const row = document.createElement('div');
    row.className = 'combo-item-row';
    const opts = categorias.map(c => `<option value="${c.id}" ${c.id == catId ? 'selected' : ''}>${c.nombre}</option>`).join('');
    row.innerHTML = `
        <select class="ci-cat">${opts}</select>
        <input type="number" class="ci-cant" min="1" value="${cant}" style="width:60px">
        <span style="font-size:12px;color:#888">opciones</span>
        <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>
    `;
    cont.appendChild(row);
}

async function guardarCombo() {
    const items = Array.from(document.querySelectorAll('.combo-item-row')).map(row => ({
        categoria_id: parseInt(row.querySelector('.ci-cat').value),
        cantidad: parseInt(row.querySelector('.ci-cant').value) || 1
    }));
    const body = {
        nombre: document.getElementById('fc-nombre').value.trim(),
        descripcion: document.getElementById('fc-descripcion').value.trim() || null,
        precio: parseFloat(document.getElementById('fc-precio').value),
        categoria_id: parseInt(document.getElementById('fc-categoria').value) || null,
        area_id: parseInt(document.getElementById('fc-area').value) || null,
        disponible: document.getElementById('fc-disponible').checked,
        favorito: document.getElementById('fc-favorito').checked,
        items
    };
    if (!body.nombre || isNaN(body.precio)) { alert('Nombre y precio son obligatorios.'); return; }
    try {
        if (editandoComboId) await api.patch(`/productos/combos/${editandoComboId}`, body);
        else await api.post('/productos/combos', body);
        cerrarModal('modal-combo');
        await cargarCombos();
    } catch(err) { alert('Error: ' + err.message); }
}

async function eliminarComboSel() {
    if (!comboSel || !confirm(`¿Eliminar combo "${comboSel.nombre}"?`)) return;
    try { await api.delete(`/productos/combos/${comboSel.id}`); comboSel = null; await cargarCombos(); }
