<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante — Acceso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #4f46e5;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background: #4338ca;
        }

        button:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🍽️ Gestión</h1>
            <p>Panel de gerencia</p>
        </div>

        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
        </div>

        <button id="btn-login" onclick="handleLogin()">Ingresar</button>

        <div class="error" id="error-msg"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Si ya está logueado, ir al dashboard
        if (getToken()) {
            window.location.href = "dashboard.html";
        }

        // Permitir login con Enter
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") handleLogin();
        });

        async function handleLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const btn = document.getElementById("btn-login");
            const errorDiv = document.getElementById("error-msg");

            if (!username || !password) {
                mostrarError("Completá usuario y contraseña.");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Ingresando...";
            errorDiv.style.display = "none";

            try {
                const data = await login(username, password);
                // Redirigir según rol
                if (["admin", "gerente"].includes(data.rol)) {
                    window.location.href = "dashboard.html";
                } else {
                    mostrarError("Este panel es solo para gerentes y administradores.");
                    logout();
                }
            } catch (err) {
                mostrarError(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Ingresar";
            }
        }

        function mostrarError(msg) {
            const div = document.getElementById("error-msg");
            div.textContent = msg;
            div.style.display = "block";
        }
    </script>
</body>
</html>
